<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>민실 1주차 스터디 채점 프로그램</title>

<style>

body{
font-family: Arial;
margin:40px;
}

textarea{
width:700px;
height:120px;
font-size:18px;
padding:10px;
}

.problem{
margin-bottom:40px;
}

.result{
margin-top:10px;
font-size:18px;
line-height:1.6;
}

.wrong{
color:red;
font-weight:bold;
}

button{
font-size:20px;
padding:10px 30px;
margin-top:40px;
}

</style>
</head>

<body>

<h2>민실 1주차 스터디 채점 프로그램</h2>

<div id="exam"></div>

<img src="https://i.namu.wiki/i/qxU6aXEmsX8QxrnyT4mzmNAPto9M0Y7DTteM6wuw0HUv-ZJ02oo62ajoc-nFO3qPUtsV94wqc6yzJM4UYQg6Eg.webp"
onclick="gradeAll()"
style="cursor:pointer; width:200px;">

<script>

const answers = {

1:"피고는 원고에게 5,000,000원 및 이에 대한 이 사건 소장 부본 송달 다음 날부터 다 갚는 날까지 연 12%의 비율로 계산한 돈을 지급하라.",
2:"피고들은 원고에게 각 5,000,000원 및 이에 대한 이 사건 소장 부본 송달 다음 날부터 다 갚는 날까지 연 12%의 비율로 계산한 돈을 지급하라.",
3:"원고에게, 피고 이수연은 5,000,000원, 피고 김동희는 10,000,000원 및 위 각 금원에 대한 이 사건 소장 부본 송달 다음 날부터 다 갚는 날까지 연 12%의 비율로 계산한 돈을 각 지급하라.",
4:"원고에게 피고 갑, 을은 공동하여 10,000,000원을, 피고 갑, 병은 공동하여 5,000,000원을 각 지급하라.",
5:"피고들은 연대하여 원고에게 5,000,000원 및 이에 대한 2020. 5. 1.부터 이 사건 소장부본 송달일까지는 연 10%의, 그 다음 날부터 다 갚는 날까지는 연 12%의 각 비율로 계산한 돈을 지급하라.",
6:"원고에게, 피고 을은 90,000,000원을, 피고 갑은 피고 을과 공동하여 위 돈 중 75,000,000원을 각 지급하라.",
7:"피고는 원고에게 250,000,000원 및 그 중 50,000,000원에 대하여 2021. 4. 2.부터 이 사건 소장 부본 송달일까지는 연 5%의, 그 다음 날부터 다 갚는 날까지는 연 12%의 각 비율로 계산한 돈을, 나머지 200,000,000원에 대하여 2021. 7. 20.부터 이 사건 소장 부본 송달일까지는 연 5%의, 그 다음 날부터 다 갚는 날까지는 연 12%의 각 비율로 계산한 돈을 각 지급하라."

}

function buildPage(){

let html=""

for(let i in answers){

html+=`
<div class="problem">
<h3>${i}번</h3>

<textarea id="answer${i}" placeholder="답 입력"></textarea>

<div id="result${i}" class="result"></div>
</div>
`

}

document.getElementById("exam").innerHTML=html

}

function buildLCS(a,b){

let m=a.length
let n=b.length

let dp=Array.from({length:m+1},()=>Array(n+1).fill(0))

for(let i=1;i<=m;i++){
for(let j=1;j<=n;j++){

if(a[i-1]===b[j-1]){
dp[i][j]=dp[i-1][j-1]+1
}else{
dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1])
}

}
}

return dp

}

function highlight(user,correct){

let dp=buildLCS(correct,user)

let i=correct.length
let j=user.length
let result=""

while(i>0 && j>0){

if(correct[i-1]===user[j-1]){
result=user[j-1]+result
i--
j--
}
else if(dp[i][j-1] >= dp[i-1][j]){
result='<span class="wrong">'+user[j-1]+'</span>'+result
j--
}
else{
i--
}

}

while(j>0){
result='<span class="wrong">'+user[j-1]+'</span>'+result
j--
}

return result

}

function lcsLength(a,b){

let dp=buildLCS(a,b)
return dp[a.length][b.length]

}

function gradeAll(){

for(let i in answers){

let user=document.getElementById("answer"+i).value.trim()
let correct=answers[i]

let lcs=lcsLength(correct,user)

let wrongCount=(correct.length+user.length)-2*lcs

let colored=highlight(user,correct)

document.getElementById("result"+i).innerHTML=
"<b>틀린 개수: "+wrongCount+"개</b><br><br>"+
colored+
"<br><br><b>정답</b><br>"+correct

}

}

buildPage()

</script>

</body>
</html>
